name: sogs_cpu
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10

  - pytorch=2.4
  - torchvision=0.19

  # for compatibility with imagecodecs 2023.9.18
  - numpy<2

  - click=8.1
  - hydra-core=1.3
  - kornia=0.7
  - opencv=4.10
  - pandas=2.2
  - pip=24.3
  - plyfile=1.1
  - scipy=1.14
  - tqdm=4.67

  - pip:
      # Skip diff-gaussian-rasterization and simple-knn (CUDA-only, not needed for compression)
      - submodules/PLAS

      # later imagecodecs version produce much larger JPEG XL files
      - imagecodecs[all]==2023.9.18

      - wandb==0.18.7
